name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: user-crud
  WORKING_DIR: user-crud

jobs:
  build-and-test:
    name: Build, Test & Quality Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-crud
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installazione JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven
          cache-dependency-path: user-crud/pom.xml

      - name: Compilazione del codice
        run: mvn -B compile

      - name: Esecuzione dei test
        run: mvn -B test

      - name: Analisi qualità (SonarCloud)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
          -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
          -Dsonar.host.url=https://sonarcloud.io

      - name: Build dell'artefatto
        run: mvn -B package -DskipTests

      - name: Upload artefatto
        uses: actions/upload-artifact@v4
        with:
          name: user-crud-jar
          path: user-crud/target/user-crud.jar

  docker-build-and-push:
    name: Creazione immagine Docker
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Download artefatto
        uses: actions/download-artifact@v4
        with:
          name: user-crud-jar
          path: user-crud/target

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push immagine Docker
        uses: docker/build-push-action@v5
        with:
          context: user-crud
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/user-crud:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/user-crud:latest

  deploy:
    name: Deploy
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH su server remoto
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG,DOCKERHUB_USERNAME
          script: |
            export IMAGE_TAG=${{ github.sha }}
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose pull
            docker compose up -d
            docker image prune -f
